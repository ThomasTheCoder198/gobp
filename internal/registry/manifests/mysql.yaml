id: mysql
kind: db
display: MySQL
description: MySQL via gorm + mysql driver
go_imports:
  - gorm.io/gorm
  - gorm.io/driver/mysql
go_requires:
  - gorm.io/gorm
  - gorm.io/driver/mysql
config:
  - key: mysql
    type: MySQLConfig
    fields:
      host:     { type: string, default: localhost }
      port:     { type: int,    default: 3306 }
      user:     { type: string, default: root }
      password: { type: string, default: "", secret: true }
      database: { type: string, default: app }
env_overrides:
  - { env: MYSQL_HOST,     key: mysql.host }
  - { env: MYSQL_PORT,     key: mysql.port }
  - { env: MYSQL_USER,     key: mysql.user }
  - { env: MYSQL_PASSWORD, key: mysql.password }
  - { env: MYSQL_DB,       key: mysql.database }
compose:
  service: mysql
  image: mysql:8.4
  ports: ["3306:3306"]
  environment:
    MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    MYSQL_DATABASE: ${MYSQL_DB:-app}
  volumes: ["mysql_data:/var/lib/mysql"]
  named_volume: mysql_data
